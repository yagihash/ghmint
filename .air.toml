root = "."
tmp_dir = "tmp"

[build]
  cmd = "mise run build"
  bin = "./dist/mini-gh-sts"
  full_bin = "direnv exec . ./dist/mini-gh-sts"
  include_ext = ["go"]
  include_file = [".envrc"]
  exclude_dir = ["dist", "vendor", ".git", ".github"]
  kill_delay = "2s"
  rerun_delay = 500

[log]
  time = true
  main_only = false

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"

[misc]
  clean_on_exit = true
