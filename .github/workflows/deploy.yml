name: deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: main
    permissions:
      contents: read
      id-token: write

    env:
      IMAGE: asia-northeast1-docker.pkg.dev/yagihash-lab/sts/sts

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: projects/346973490040/locations/global/workloadIdentityPools/github-yagihash-pool/providers/mini-gh-sts-provider
          service_account: mini-gh-sts@yagihash-lab.iam.gserviceaccount.com

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker asia-northeast1-docker.pkg.dev --quiet

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Build and push
        id: push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          push: true
          tags: ${{ env.IMAGE }}:${{ github.sha }}

      - name: Sign image
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
        run: cosign sign --yes "$IMAGE@$DIGEST"

      - name: Deploy to Cloud Run
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          gcloud run services update sts \
            --image "$IMAGE@$DIGEST" \
            --region asia-northeast1 \
            --project yagihash-lab
