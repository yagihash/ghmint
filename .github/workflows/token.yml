name: token

on:
  workflow_dispatch:

permissions:
  id-token: write

jobs:
  token:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Request token
        id: sts
        uses: ./.github/actions/token

      - name: Use token
        env:
          TOKEN: ${{ steps.sts.outputs.token }}
        run: echo "Got token (length=${#TOKEN})"
