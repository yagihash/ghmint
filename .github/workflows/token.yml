name: token

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  token:
    strategy:
      matrix:
        num: [1, 2, 3]
    runs-on: ubuntu-slim
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Test Policy ${{ matrix.num }}
        continue-on-error: true
        id: token
        uses: ./.github/actions/token
        with:
          scope: ${{ github.repository }}
          policy: test-policy-${{ matrix.num }}
          hostname: mini-gh-sts.ssrf.dev

      - name: Verify token
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
        run: |
          gh auth status