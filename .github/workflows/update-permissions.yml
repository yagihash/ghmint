name: "Update GitHub App permissions"

on:
  schedule:
    - cron: "0 9 * * 1" # every Monday at 09:00 UTC
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: cicd-sensor/cicd-sensor-action@1935de498397aa7b9bf6ac7ca822ddb430a34843 # v0.0.31

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26"

      - name: go generate
        run: go generate ./internal/webhook/...

      - name: Get ghmint token
        id: ghmint
        uses: yagihash/ghmint-action@be57533eef7f69550d06f0c93eede5589158281a # v1.0.0
        with:
          scope: ${{ github.repository }}
          policy: update-permissions

      - name: Setup git
        env:
          GH_TOKEN: ${{ steps.ghmint.outputs.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          gh auth setup-git

      - name: Create PR if changed
        env:
          GH_TOKEN: ${{ steps.ghmint.outputs.token }}
        run: |
          if ! git diff --quiet; then
            BRANCH="chore/update-permissions-$(date +%Y%m%d)"
            git checkout -b "$BRANCH"
            git add internal/webhook/permissions_gen.go
            git commit -m "chore: update GitHub App permissions from OpenAPI spec"
            git push origin "$BRANCH" --force

            if PR_URL=$(gh pr create \
              --title "chore: update GitHub App permissions from OpenAPI spec" \
              --body $'Regenerated `internal/webhook/permissions_gen.go` from the GitHub REST API OpenAPI spec.\n\n- Source: `components/schemas/app-permissions`\n- Generator: `tools/gen-permissions`' \
              --base main \
              --head "$BRANCH"); then
              :
            else
              PR_URL=$(gh pr view "$BRANCH" --json url --jq '.url')
            fi

            {
              echo "## Update GitHub App permissions"
              echo ""
              echo "Changes detected. A pull request has been created or updated."
              echo ""
              echo "**Pull Request:** $PR_URL"
              echo ""
              echo "### Diff"
              echo '```diff'
              git diff HEAD~1 HEAD -- internal/webhook/permissions_gen.go
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "## Update GitHub App permissions"
              echo ""
              echo "No changes detected. \`permissions_gen.go\` is already up to date."
            } >> "$GITHUB_STEP_SUMMARY"
          fi
