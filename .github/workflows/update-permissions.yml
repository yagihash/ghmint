name: "Update GitHub App permissions"

on:
  schedule:
    - cron: "0 9 * * 1" # every Monday at 09:00 UTC
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-slim
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: true

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26"

      - name: go generate
        run: go generate ./internal/webhook/...

      - uses: peter-evans/create-pull-request@v7
        with:
          title: "chore: update GitHub App permissions from OpenAPI spec"
          body: |
            `internal/webhook/permissions_gen.go` を GitHub REST API OpenAPI spec から再生成しました。

            - Source: `components/schemas/app-permissions`
            - Generator: `tools/gen-permissions`
          branch: chore/update-permissions
          commit-message: "chore: update GitHub App permissions from OpenAPI spec"
          delete-branch: true
