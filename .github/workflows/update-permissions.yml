name: "Update GitHub App permissions"

on:
  schedule:
    - cron: "0 9 * * 1" # every Monday at 09:00 UTC
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-slim
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26"

      - name: go generate
        run: go generate ./internal/webhook/...

      - name: Setup git
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          gh auth setup-git

      - name: Create PR if changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! git diff --quiet; then
            BRANCH="chore/update-permissions-$(date +%Y%m%d)"
            git checkout -b "$BRANCH"
            git add internal/webhook/permissions_gen.go
            git commit -m "chore: update GitHub App permissions from OpenAPI spec"
            git push origin "$BRANCH" --force

            PR_URL=$(gh pr create \
              --title "chore: update GitHub App permissions from OpenAPI spec" \
              --body $'`internal/webhook/permissions_gen.go` を GitHub REST API OpenAPI spec から再生成しました。\n\n- Source: `components/schemas/app-permissions`\n- Generator: `tools/gen-permissions`' \
              --base main \
              --head "$BRANCH" 2>&1 \
              || gh pr view "$BRANCH" --json url --jq '.url')

            {
              echo "## Update GitHub App permissions"
              echo ""
              echo "Changes detected. A pull request has been created or updated."
              echo ""
              echo "**Pull Request:** $PR_URL"
              echo ""
              echo "### Diff"
              echo '```diff'
              git diff HEAD~1 HEAD -- internal/webhook/permissions_gen.go
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "## Update GitHub App permissions"
              echo ""
              echo "No changes detected. \`permissions_gen.go\` is already up to date."
            } >> "$GITHUB_STEP_SUMMARY"
          fi
