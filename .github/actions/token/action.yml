name: Request mini-gh-sts token
description: GitHub Actions OIDC token を使って mini-gh-sts から GitHub App token を取得する

inputs:
  hostname:
    description: mini-gh-sts のホスト名
    required: false
    default: mini-gh-sts.ssrf.dev
  scope:
    description: トークンのスコープ（<org> または <org>/<repo> 形式）
    required: false
    default: ""
  policy:
    description: 使用するポリシー名
    required: false
    default: ""

outputs:
  token:
    description: 取得した GitHub App token

runs:
  using: node20
  main: dist/index.js
