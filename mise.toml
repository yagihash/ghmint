[tools]
go = "1.26.1"

[tasks.build]
description = "Build both binaries to dist/"
run = [
  "go build -ldflags='-s -w' -trimpath -o dist/mini-gh-sts ./cmd/mini-gh-sts/main.go",
]

[tasks.test]
description = "Run unit tests with coverage and race detection"
run = "go test -v -cover -race ./..."

[tasks.coverage]
description = "Generate HTML coverage report and open it"
run = [
  "go test -v -cover -race ./... -coverprofile=/tmp/cover.out",
  "go tool cover -html=/tmp/cover.out -o /tmp/cover.html",
  "open /tmp/cover.html",
]
