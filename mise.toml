[tools]
go = "1.26.2"
"go:github.com/air-verse/air" = "latest"

[tasks.dev]
description = "Start development server with hot reload"
run = "air"

[tasks.build]
description = "Build the binary"
run = "go build -ldflags='-s -w' -trimpath -o dist/ghmint ./cmd/ghmint/main.go"

[tasks.test]
description = "Run unit tests with coverage and race detection"
run = "go test -v -cover -race ./..."

[tasks.coverage]
description = "Generate HTML coverage report and open it"
run = [
  "go test -v -cover -race ./... -coverprofile=/tmp/cover.out",
  "go tool cover -html=/tmp/cover.out -o /tmp/cover.html",
  "open /tmp/cover.html",
]
